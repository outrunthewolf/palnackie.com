lead: "The charity set up to benefit the people of Buittle Parish — and owners of our village hall and the north side of the port."
body_md: |
  Buittle Quest was set up to benefit the people of Buittle Parish and members of the public, groups and organisations visiting Buittle Parish. Buittle Parish is the area administered by [Buittle Parish Community Council](/community-council/).

  The Buittle Parish Boundary Map can be found here: [info.dumgal.gov.uk](https://info.dumgal.gov.uk/CommunityCouncils/Home/Detail/71).

  Buittle Quest owns our [village hall](/village-hall/) and the north side of our port.
